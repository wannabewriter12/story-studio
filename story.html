<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
  </div>

  <header class="editor-header">
    <div class="toolbar">

      <!-- Formatting buttons -->
      <button data-cmd="bold"><b>B</b></button>
      <button data-cmd="italic"><i>I</i></button>
      <button data-cmd="underline"><u>U</u></button>
      <button data-cmd="strikeThrough">S</button>

      <!-- Font family -->
      <select id="fontFamily">
        <option value="">Font</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
      </select>

      <!-- Font size -->
      <select id="fontSize">
        <option value="">Size</option>
        <option value="2">Small</option>
        <option value="3">Normal</option>
        <option value="4">Large</option>
        <option value="5">XL</option>
      </select>

      <!-- Color picker -->
      <input type="color" id="colorPicker">

      <!-- Color palette -->
      <div id="colorPalette">
        <button data-color="#ffb3c6"></button>
        <button data-color="#c8b5ff"></button>
        <button data-color="#8ecaff"></button>
        <button data-color="#a8f0c6"></button>
      </div>

      <!-- Download -->
      <button id="downloadDocx">Download</button>
    </div>

    <div class="editor-status">
      <span id="status">Saved</span>
      <span id="wordCount">0 words</span>
    </div>
  </header>

  <main>
    <div id="editor" contenteditable="true" class="editor-area"></div>
  </main>

  <script src="editor.js"></script>
</body>
</html>
