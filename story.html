<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Story Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="themes.css" />
</head>
<body class="theme-minimal">
  <header class="top-bar">
    <div class="left">
      <a href="index.html" class="back-link">← Library</a>
      <input id="titleInput" class="title-input" placeholder="Untitled story" />
    </div>
    <div class="top-actions">
      <select id="themeSelect">
        <option value="theme-minimal">Minimal (B&W)</option>
        <option value="theme-soft">Soft Aesthetic</option>
        <option value="theme-dark">Dark Night</option>
      </select>
      <span id="status" class="status-indicator">Saved</span>
    </div>
  </header>

  <main class="editor-container">
    <textarea id="editor" placeholder="Start writing your story here..."></textarea>
  </main>

  <script src="editor.js"></script>
</body>
</html>
<main class="editor-container">
  <div class="toolbar">
    <select id="fontFamily">
      <option value="">Default</option>
      <option value="Georgia, serif">Serif</option>
      <option value="'Times New Roman', serif">Times New Roman</option>
      <option value="'Courier New', monospace">Typewriter</option>
    </select>

    <select id="fontSize">
      <option value="">Size</option>
      <option value="12px">12</option>
      <option value="14px">14</option>
      <option value="16px">16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
    </select>

    <button type="button" data-cmd="bold">B</button>
    <button type="button" data-cmd="italic"><em>I</em></button>
    <button type="button" data-cmd="underline"><u>U</u></button>

    <button type="button" data-cmd="justifyLeft">⟸</button>
    <button type="button" data-cmd="justifyCenter">⟺</button>
    <button type="button" data-cmd="justifyRight">⟹</button>
  </div>

  <div id="editor" class="rich-editor" contenteditable="true"
       placeholder="Start writing your story here..."></div>
</main>
