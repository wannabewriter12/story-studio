<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Editor</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="themes.css" />
</head>
<body class="theme-pastel">
  <!-- Loader -->
  <div id="loader">
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
  </div>

  <header class="editor-top-bar">
    <div class="left">
      <a href="index.html" class="back-link">← Stories</a>
    </div>

    <div class="center toolbar">
      <button data-cmd="bold" class="btn icon"><b>B</b></button>
      <button data-cmd="italic" class="btn icon"><i>I</i></button>
      <button data-cmd="underline" class="btn icon"><u>U</u></button>
      <button data-cmd="strikeThrough" class="btn icon">S</button>

      <select id="fontFamily" class="select small">
        <option value="">Font</option>
        <option value="Inter">Inter</option>
        <option value="Quicksand">Quicksand</option>
        <option value="Cormorant Garamond">Cormorant Garamond</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times</option>
        <option value="Courier New">Courier</option>
      </select>

      <select id="fontSize" class="select small">
        <option value="">Size</option>
        <option value="2">Small</option>
        <option value="3">Normal</option>
        <option value="4">Large</option>
        <option value="5">XL</option>
      </select>

      <input type="color" id="colorPicker" class="color-input" />

      <div id="colorPalette" class="color-palette">
        <button data-color="#ffb3c6" class="swatch"></button>
        <button data-color="#c8b5ff" class="swatch"></button>
        <button data-color="#8ecaff" class="swatch"></button>
        <button data-color="#a8f0c6" class="swatch"></button>
      </div>
    </div>

    <div class="right editor-meta">
      <span id="status" class="status-pill">Saved</span>
      <span id="wordCount" class="word-count">0 words</span>
      <button id="downloadDocx" class="btn ghost small">Download</button>
    </div>
  </header>

  <main class="editor-main">
    <div id="editor" class="editor-area" contenteditable="true"></div>
  </main>

  <!-- Floating frosted-glass toolbar -->
  <div class="floating-toolbar">
    <button data-cmd="bold" class="fbtn"><b>B</b></button>
    <button data-cmd="italic" class="fbtn"><i>I</i></button>
    <button data-cmd="underline" class="fbtn"><u>U</u></button>
    <button data-cmd="strikeThrough" class="fbtn">S</button>

    <div class="f-separator"></div>

    <button data-cmd="justifyLeft" class="fbtn">⟸</button>
    <button data-cmd="justifyCenter" class="fbtn">⟺</button>
    <button data-cmd="justifyRight" class="fbtn">⟹</button>

    <div class="f-separator"></div>

    <select id="floatFontSize" class="fselect">
      <option value="">A</option>
      <option value="2">S</option>
      <option value="3">M</option>
      <option value="4">L</option>
      <option value="5">XL</option>
    </select>

    <input type="color" id="floatColorPicker" class="fcolor" />
  </div>

  <script src="editor.js"></script>
</body>
</html>
