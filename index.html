<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Story Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="theme-minimal">

  <header>
    <h1>Story Studio</h1>

    <div class="top-actions">
      <select id="themeSelect">
        <option value="theme-minimal">Minimal</option>
        <option value="theme-dark">Dark</option>
        <option value="theme-soft">Soft</option>
      </select>

      <button id="backupBtn">Download Backup</button>
      <button id="importBtn">Import Backup</button>
      <button id="newStoryBtn">New Story</button>
    </div>
  </header>

  <main>
    <div id="storiesList"></div>
  </main>

  <input type="file" id="importFile" accept=".json" style="display:none;" />

  <script src="script.js"></script>
</body>
</html>
