<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
  </div>

  <header>
    <h1>Story Studio</h1>

    <div class="top-controls">
      <select id="themeSelect">
        <option value="theme-minimal">Minimal</option>
        <option value="theme-pastel">Pastel</option>
        <option value="theme-dark">Dark</option>
      </select>

      <button id="backupBtn">Backup</button>
      <button id="importBtn">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
  </header>

  <main>
    <button id="newStoryBtn" class="primary-btn">New Story</button>

    <div id="storiesList" class="story-list"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
