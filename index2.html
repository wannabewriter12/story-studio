<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Studio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="themes.css">
</head>

<body class="theme-pastel">
  <!-- Loader -->
  <div id="loader">
    <div class="dot dot1"></div>
    <div class="dot dot2"></div>
    <div class="dot dot3"></div>
  </div>

  <header class="top-bar">
    <h1 class="logo">Story Studio</h1>

    <div class="top-controls">
      <select id="themeSelect" class="select">
        <option value="theme-minimal">Minimal</option>
        <option value="theme-pastel" selected>Pastel</option>
        <option value="theme-dark">Dark</option>
      </select>

      <button id="backupBtn" class="btn ghost">Backup</button>
      <button id="importBtn" class="btn ghost">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
  </header>

  <main class="main-layout">
    <section class="panel">
      <div class="panel-header">
        <h2>Your stories</h2>
        <button id="newStoryBtn" class="btn primary">New story</button>
      </div>
      <div id="storiesList" class="story-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
